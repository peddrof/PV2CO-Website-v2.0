<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página Não Encontrada | PV2CO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-content {
            text-align: center;
            max-width: 600px;
            padding: 60px 0;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 20px;
            font-family: "Instrument Serif Pro", serif;
            font-style: italic;
        }

        .error-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            font-family: "SF Pro", sans-serif;
        }

        .error-description {
            font-size: 1.2rem;
            color: #D1D1D1;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .hero-buttons-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

        .hero-button {
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 14px 28px;
            font-family: "SF Pro", sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
        }

        .hero-button:hover {
            background-color: #D1D1D1;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }


        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .error-code {
                font-size: 6rem;
            }

            .error-title {
                font-size: 2rem;
            }

            .error-description {
                font-size: 1.1rem;
            }

            .hero-buttons-container {
                flex-direction: column;
                align-items: center;
            }

            .hero-button {
                width: 100%;
                max-width: 300px;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 4rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-description {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-content">
            <div class="error-code">404</div>
            
            <h1 class="error-title">Page Not Found</h1>
            
            <p class="error-description">
                Oops! The page you're looking for doesn't exist or has been moved. 
            </p>

            <div class="hero-buttons-container">
                <a href="/" class="hero-button">Back to Home</a>
            </div>
        </div>
    </div>

</body>
</html>
