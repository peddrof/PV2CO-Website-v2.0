<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIT3T 2025 - Projeto de Literatura | PV2CO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .header {
            text-align: center;
            padding: 80px 0 60px 0;
        }

        .project-title {
            font-size: 3rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            font-family: "Instrument Serif Pro", serif;
            font-style: italic;
        }

        .project-subtitle {
            font-size: 1.5rem;
            color: #D1D1D1;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section {
            margin-bottom: 50px;
        }

        .section h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            font-family: "SF Pro", sans-serif;
        }

        .section p {
            font-size: 1.1rem;
            color: #D1D1D1;
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            margin: 40px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .highlight {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 30px 0;
        }

        .highlight p {
            font-size: 1.2rem;
            font-weight: 500;
            color: #ffffff;
            text-align: center;
            margin: 0;
        }

        .back-button {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 14px 28px;
            font-family: "SF Pro", sans-serif;
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
            margin: 40px 0;
        }

        .back-button:hover {
            background-color: #D1D1D1;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        .footer {
            text-align: center;
            padding: 60px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 80px;
        }

        .footer p {
            color: #7A7A7A;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }

            .project-title {
                font-size: 2.5rem;
            }

            .project-subtitle {
                font-size: 1.2rem;
            }

            .section h2 {
                font-size: 1.5rem;
            }

            .section p {
                font-size: 1rem;
            }

            .highlight p {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 480px) {
            .project-title {
                font-size: 2rem;
            }

            .project-subtitle {
                font-size: 1rem;
            }

            .section h2 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="project-title">Vídeo Literatura T3 - Recomende um Livro</h1>
            <p class="project-subtitle">Versão final no YouTube</p>
        </div>

        <div class="content">
            <div class="section">
                <h2></h2>
                

            <div style="text-align: center;">
                <a href="https://youtu.be/vVOLR_T0F4w" class="back-button">Acessar vídeo</a>
            </div>
        </div>

        
    </div>
</body>
</html>
